name: Fix imageUrls in network.yaml

on:
  push:
    paths:
      - 'network.yaml'

jobs:
  fix-imageurls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fix imageUrls
        run: python3 fix_imageurls.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet network.yaml || (git add network.yaml && git commit -m "Auto: restore imageUrls in network.yaml")
          git push
